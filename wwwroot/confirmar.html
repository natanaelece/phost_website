<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Premier Host | Confirmar E-mail</title>
    <meta name="description" content="Confirme seu endereço de e-mail para ativar sua conta Premier Host.">
    <link rel="canonical" href="https://phost.pro/confirmar">
    <meta property="og:locale" content="pt_BR">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Premier Host">
    <meta property="og:title" content="Premier Host | Confirmar E-mail">
    <meta property="og:description" content="Confirme seu endereço de e-mail para ativar sua conta Premier Host.">
    <meta property="og:url" content="https://phost.pro/confirmar">
    <meta property="og:image" content="https://phost.pro/img/oficialsemfundo.png">
    <meta property="og:image:width" content="849">
    <meta property="og:image:height" content="281">
    <meta property="og:image:alt" content="Premier Host">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Premier Host | Confirmar E-mail">
    <meta name="twitter:description" content="Confirme seu endereço de e-mail para ativar sua conta Premier Host.">
    <meta name="twitter:image" content="https://phost.pro/img/oficialsemfundo.png">
    <link rel="icon" href="img/Ícone48x48.ico">
    <link rel="stylesheet" href="/css/tailwind.css">
    <style>
        body { background-color: #081121; }
        .glow-blue { box-shadow: 0 0 25px rgba(37, 99, 235, 0.3); }
    </style>
</head>
<body class="text-slate-300 font-sans min-h-screen flex items-center justify-center p-4 relative">
    
    <div class="bg-slate-900 border border-slate-700 w-full max-w-md rounded-2xl p-8 shadow-2xl relative glow-blue text-center">
        <!-- Logotipo Padronizado -->
        <img src="img/iconesemfundo.png" alt="Premierhost" class="h-20 mx-auto mb-6 object-contain">

        <h1 id="statusTitle" class="text-2xl font-bold text-white mb-2 uppercase tracking-wider">Confirmando seu e-mail...</h1>
        <p id="statusMsg" role="status" aria-live="polite" class="text-sm text-slate-400 mb-6">Aguarde enquanto validamos seu cadastro.</p>
        
        <div id="loader" class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-500 mx-auto mb-4"></div>
        
        <a id="btnLogin" href="/?action=login" class="hidden w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-lg transition-all mt-4 inline-block">Entrar na minha conta</a>
    </div>

    <script src="/analytics.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const title = document.getElementById('statusTitle');
            const msg = document.getElementById('statusMsg');
            const loader = document.getElementById('loader');
            const btn = document.getElementById('btnLogin');
            
			if (token) {
				window.history.replaceState({}, document.title, window.location.pathname);
			}
		
            if (!token) {
                title.innerText = "Erro de validação";
                title.classList.replace('text-white', 'text-red-500');
                msg.innerText = "O token de confirmação não foi encontrado na URL.";
                loader.classList.add('hidden');
                btn.classList.remove('hidden');
                return;
            }
            
            try {
                // Chama a API para validar o token no banco de dados
                const res = await fetch(`/api/auth/confirm-email?token=${token}`);
                const data = await res.json();
                
                loader.classList.add('hidden');
                
                if (res.ok) {
                    title.innerText = "E-mail confirmado!";
                    title.classList.replace('text-white', 'text-green-500');
                    msg.innerText = data.mensagem || "Sua conta foi ativada com sucesso. Você já pode fazer login no painel.";
					
					if (data.email) {
						btn.href = `/?action=login&email=${encodeURIComponent(data.email)}`;
					} else {
						btn.href = "/?action=login";
					}
	
                    btn.classList.remove('hidden');
                    window.premierAnalytics?.track('email_confirmed', { result: 'success' });
                } else {
                    title.innerText = "Falha na Ativação";
                    title.classList.replace('text-white', 'text-red-500');
                    msg.innerText = data.erro || "Este token é inválido ou já expirou.";
                    btn.classList.remove('hidden');
                }
            } catch (err) {
                loader.classList.add('hidden');
                title.innerText = "Erro de Conexão";
                title.classList.replace('text-white', 'text-red-500');
                msg.innerText = "Não foi possível se comunicar com o servidor da API. Tente novamente mais tarde.";
                btn.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
